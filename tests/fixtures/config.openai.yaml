# Пример OpenAI-совместимой конфигурации для тестов.
# Секрет задаётся через переменную окружения api_key_env.

project:
  name: sample_project

discovery:
  implementation: filesystem
  extensions: [.py]
  exclude_dirs: [__pycache__, .git, .venv, venv, generated_docs, node_modules]

extraction:
  language: python

call_graph:
  implementation: static

context:
  implementation: default
  prompt: sectioned
  include_source_body: true
  include_imports: true
  include_call_graph: true
  max_context_chars: 32000

generation:
  implementation: llm
  provider: openai
  language: ru
  incremental: false
  workers: 1
  max_retries: 2
  providers:
    openai:
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-4o-mini
      project: ""
      timeout: 120
      temperature: 0.3
      max_tokens: 2000

validation:
  implementation: structured
  retry_on_blocking: true
  blocking_fallback: retry

output:
  implementation: markdown
  directory: ./generated_docs

reporting:
  implementation: file
  log_llm_content: false
  quiet: true
