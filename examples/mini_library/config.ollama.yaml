# Генерация документации для mini_library (Ollama)
project:
  name: mini_library

discovery:
  implementation: filesystem
  extensions: [.py]
  exclude_dirs: [__pycache__, .git, .venv, venv, generated_docs, node_modules]

extraction:
  language: python

call_graph:
  implementation: static

context:
  implementation: default
  prompt: sectioned
  include_source_body: true
  include_imports: true
  include_call_graph: true
  max_context_chars: 32000

generation:
  implementation: llm
  provider: ollama
  language: ru
  incremental: false
  workers: 1
  max_retries: 2
  providers:
    ollama:
      base_url: http://localhost:11434
      model: qwen2.5-coder:7b
      timeout: 120

validation:
  implementation: structured
  retry_on_blocking: true
  blocking_fallback: retry

output:
  implementation: markdown
  directory: ./examples/mini_library/generated_docs

reporting:
  implementation: file
  log_llm_content: false
  quiet: false
