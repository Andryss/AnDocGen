# Генерация документации для mini_api (Yandex AI Studio — DeepSeek V4 Flash)
project:
  name: mini_api

discovery:
  implementation: filesystem
  extensions: [.py]
  exclude_dirs: [__pycache__, .git, .venv, venv, .andocgen, generated_docs, node_modules]

extraction:
  language: python

call_graph:
  implementation: static

context:
  implementation: default
  prompt: sectioned
  include_source_body: true
  include_imports: true
  include_call_graph: true
  max_context_chars: 32000

generation:
  implementation: llm
  provider: openai
  language: ru
  incremental: false
  workers: 2
  max_retries: 2
  providers:
    openai:
      base_url: https://ai.api.cloud.yandex.net/v1
      api_key_env: YANDEX_API_KEY
      project: b1gj4mdp1fmb5pkkj1c0
      model: gpt://b1gj4mdp1fmb5pkkj1c0/deepseek-v4-flash
      timeout: 180
      temperature: 0.3
      max_tokens: 4000

validation:
  implementation: structured
  retry_on_blocking: true
  blocking_fallback: retry

output:
  implementation: markdown
  directory: ./examples/mini_api/generated_docs_deepseek-v4-flash

reporting:
  implementation: file
  log_llm_content: false
  quiet: false
